name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Pick up new YouTube uploads without anyone touching the repo.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Least-privilege token that the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Refreshes data/videos.json in the working tree only — deliberately
      # not committed. View counts change constantly, so committing would
      # produce a noisy commit every run; the build reads the fresh file
      # either way, and the committed copy stays as the offline fallback.
      # Never fails the deploy: on a feed outage it logs and leaves the
      # file alone.
      - name: Sync latest videos
        run: node scripts/sync-videos.mjs

      # Same deal for Twitch. Needs free credentials from
      # https://dev.twitch.tv/console added as repository secrets; without
      # them the script logs a notice and the committed fallback is used.
      - name: Sync latest VODs
        run: node scripts/sync-vods.mjs
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}

      - name: Build static export
        run: npm run build
        env:
          # User page (username.github.io) serves at the domain root, so no
          # base path. The canonical/OG/sitemap URL is derived from the repo
          # owner, so nothing here is hardcoded.
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
          # Lets the build read live status; optional.
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
