name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Refresh the tweet feed and republish four times a day.
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

# contents: write so the tweet sync can commit data/tweets.json back.
permissions:
  contents: write
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Never fails the deploy: with no token, a rate limit or an X
      # outage the script logs a notice and leaves the file alone.
      - name: Sync latest tweets
        run: node scripts/sync-tweets.mjs
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      # Committing here (rather than in a separate workflow) is deliberate:
      # a push made with GITHUB_TOKEN does not trigger other workflows, so
      # a standalone sync job would update the data but never republish.
      - name: Commit new tweets
        run: |
          if [[ -n "$(git status --porcelain data/tweets.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/tweets.json
            git commit -m "chore: sync latest tweets"
            git push
          else
            echo "No tweet changes to commit."
          fi

      - name: Build static export
        run: npm run build
        env:
          # User page (username.github.io) serves at the domain root, so no
          # base path. The canonical/OG/sitemap URL is derived from the repo
          # owner, so nothing here is hardcoded.
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
